<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arr-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-mid" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="#ffffff"/>

  <!-- ── USER BOXES (left column) ── -->
  <!-- New user -->
  <rect x="40" y="60" width="130" height="58" rx="10" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <text x="105" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">New user</text>
  <text x="105" y="103" text-anchor="middle" font-size="11" fill="#888">First session</text>

  <!-- Returning user -->
  <rect x="40" y="240" width="130" height="58" rx="10" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <text x="105" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Returning user</text>
  <text x="105" y="283" text-anchor="middle" font-size="11" fill="#888">Daily workflow</text>

  <!-- ── FEATURE BOXES (center + right) ── -->
  <!-- Competitor Tracking -->
  <rect x="240" y="44" width="190" height="64" rx="10" fill="#F9F9F9" stroke="#C8C8C8" stroke-width="1"/>
  <text x="335" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Competitor tracking</text>
  <text x="335" y="88" text-anchor="middle" font-size="11" fill="#888">What is trending now?</text>
  <!-- step number -->
  <circle cx="248" cy="52" r="9" fill="#1a1a1a"/>
  <text x="248" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">1</text>

  <!-- Performance Analytics -->
  <rect x="290" y="220" width="190" height="78" rx="10" fill="#F9F9F9" stroke="#C8C8C8" stroke-width="1"/>
  <text x="385" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Performance analytics</text>
  <text x="385" y="266" text-anchor="middle" font-size="11" fill="#888">How am I doing?</text>
  <text x="385" y="282" text-anchor="middle" font-size="11" fill="#888">What should I post next?</text>
  <circle cx="298" cy="228" r="9" fill="#1a1a1a"/>
  <text x="298" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">2</text>

  <!-- Instant Ad / Create -->
  <rect x="560" y="220" width="175" height="64" rx="10" fill="#F9F9F9" stroke="#C8C8C8" stroke-width="1"/>
  <text x="647" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Instant Ad / Create</text>
  <text x="647" y="264" text-anchor="middle" font-size="11" fill="#888">Generate &amp; publish</text>
  <circle cx="568" cy="228" r="9" fill="#1a1a1a"/>
  <text x="568" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">3</text>

  <!-- ── ARROWS ── -->
  <!-- New user → Competitor Tracking -->
  <line x1="171" y1="89" x2="238" y2="89" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="204" y="81" text-anchor="middle" font-size="10" fill="#555">build market sense</text>

  <!-- Competitor Tracking → Performance (dashed, new user path) -->
  <path d="M335 108 L335 170 L385 170 L385 218" fill="none" stroke="#AAAAAA" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-mid)"/>
  <text x="370" y="162" text-anchor="middle" font-size="10" fill="#AAA">first time</text>

  <!-- Returning user → Performance -->
  <line x1="171" y1="269" x2="288" y2="269" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="229" y="261" text-anchor="middle" font-size="10" fill="#555">check AI picks</text>

  <!-- Performance → Instant Ad -->
  <line x1="481" y1="259" x2="558" y2="259" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="519" y="251" text-anchor="middle" font-size="10" fill="#555">execute</text>

  <!-- Learning loop (dashed) -->
  <path d="M647 284 L647 390 L105 390 L105 300" fill="none" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr-mid)"/>
  <text x="390" y="408" text-anchor="middle" font-size="10" fill="#AAAAAA">results feed back into performance data</text>

  <!-- ── LEGEND ── -->
  <line x1="40" y1="430" x2="64" y2="430" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="70" y="434" font-size="10" fill="#888">active path</text>
  <line x1="150" y1="430" x2="174" y2="430" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="180" y="434" font-size="10" fill="#888">learning loop</text>

</svg>
